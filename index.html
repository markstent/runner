<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Cyberpunk Runner</title>
    <style>
      :root {
        --neon: #ff40c0;
        --cyan: #20e0ff;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #05010f; }
      body { font-family: "Segoe UI", system-ui, sans-serif; color: #fff; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      .overlay {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 1rem; text-align: center;
        background: rgba(5, 1, 15, 0.6);
        backdrop-filter: blur(2px);
      }
      .overlay[hidden] { display: none; }
      .overlay h1 { font-size: 2.5rem; margin: 0; color: var(--neon); text-shadow: 0 0 16px var(--neon); }
      .overlay .hint { color: var(--cyan); opacity: 0.85; }
      .overlay button {
        font: inherit; padding: 0.75rem 2rem; cursor: pointer;
        color: #05010f; background: var(--cyan); border: none; border-radius: 4px;
        text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700;
        box-shadow: 0 0 16px var(--cyan);
      }

      #hud {
        position: absolute; top: 1rem; left: 1rem;
        display: flex; gap: 1.5rem; font-variant-numeric: tabular-nums;
        text-shadow: 0 0 8px var(--cyan);
      }
      #hud[hidden] { display: none; }
      #hud .label { opacity: 0.6; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; }
      #hud .value { font-size: 1.5rem; color: var(--cyan); }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>

      <div id="hud" hidden>
        <div><div class="label">Score</div><div class="value" id="score">0</div></div>
        <div><div class="label">Coins</div><div class="value" id="coins">0</div></div>
      </div>

      <div id="start-overlay" class="overlay">
        <h1>Neon Runner</h1>
        <p class="hint">Arrow Keys / WASD to move &middot; Space to jump &middot; Down to slide</p>
        <button id="start-button">Start</button>
      </div>

      <div id="gameover-overlay" class="overlay" hidden>
        <h1>Game Over</h1>
        <p class="hint">Final score <span id="final-score">0</span></p>
        <button id="restart-button">Restart</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
